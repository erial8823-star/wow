<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FU角色卡</title>
  <style>
    body {
      background: #1a1a2e;
      color: #eee;
      padding: 0; /* 取消外边距，让卡片无缝贴合弹窗 */
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden; /* 隐藏浏览器默认的外部滚动条（白色滚动条） */
    }
    /* 使卡片适应弹窗大小，填满 iframe 并启用内部金色滚动条 */
    .fu-full-card {
      position: absolute !important;
      left: 0 !important;
      top: 0 !important;
      transform: none !important; /* 清除 main.css 里面的 translate(-50%, -50%) 偏移 */
      width: 100% !important;
      height: 100vh !important; /* 撑满弹窗高度 */
      max-height: 100vh !important;
      box-shadow: none !important;
      border: none !important;
      border-radius: 0 !important; /* 圆角由 OBR 弹窗外壳提供，填满 Iframe */
      margin: 0 !important;
      overflow: hidden !important; /* 隐藏容器滚动条，由内部 .fu-card-body 滚动 */
    }
    .fu-card-close {
      cursor: pointer;
    }
  </style>
  <script type="module" crossorigin src="/wow/dist/full-card.js"></script>
  <link rel="modulepreload" crossorigin href="/wow/dist/assets/modulepreload-polyfill-B-eOYwHK.js">
  <link rel="modulepreload" crossorigin href="/wow/dist/assets/lib-D1lqUKHH-mJqKNSWf-DuRg_PIi-D0UBZoUE-r2blPdp8.js">
  <link rel="stylesheet" crossorigin href="/wow/dist/assets/lib-D1lqUKHH-mJqKNSWf-DuRg_PIi-D0UBZoUE-CyfVyXQC.css">
</head>
<body>
  <div class="fu-full-card" id="cardContainer">
    <div style="text-align: center; padding: 40px; color: #888;">
      ⏳ 正在加载角色卡数据...
    </div>
  </div>

  <!-- 使用本地构建打包的脚本 -->
</body>
</html>
