<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FU角色卡</title>
  <!-- 引入全局样式以支持预览大卡片的样式 -->
  <link rel="stylesheet" href="./styles/main.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    
    /* 双栏布局容器 */
    .fu-manager-body {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* 左栏：预览区 (重写为靠右渲染，边框移至左侧) */
    .fu-manager-left {
      flex: 1;
      padding: 16px;
      overflow: hidden;
      background: #0d0d1a;
      border-left: 1px solid #2a2a44 !important;
      border-right: none !important;
      display: flex;
      flex-direction: column;
    }

    /* 右栏：列表区 (重写为靠左，固定宽度) */
    .fu-manager-right {
      width: 320px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #14142a;
      flex-shrink: 0;
    }

    /* 绑定模式下的布局微调 */
    body.bind-mode .fu-manager-left {
      display: none !important;
    }
    body.bind-mode .fu-manager-right {
      width: 100vw !important;
      border-left: none !important;
    }

    /* 右侧头部和尾部 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .header h2 { color: #f0c060; font-size: 16px; }
    .btn-import {
      background: #2d7d46;
      color: #fff;
      border: none;
      padding: 4px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-import:hover { background: #3da05a; }

    .list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid transparent;
      text-decoration: none;
    }
    .list-item:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: #3a3a5a;
    }
    .list-item.active {
      background: rgba(240, 192, 96, 0.12);
      border-color: #f0c060;
    }
    .list-item .name {
      color: #eee;
      font-size: 14px;
      font-weight: 500;
    }
    .list-item .id-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .list-item .id {
      color: #666;
      font-size: 11px;
    }
    .list-item .delete-btn {
      color: #666;
      font-size: 12px;
      cursor: pointer;
      opacity: 0.2;
      transition: all 0.2s;
    }
    .list-item:hover .delete-btn {
      opacity: 0.7;
    }
    .list-item .delete-btn:hover {
      color: #ff7b89;
      transform: scale(1.15);
      opacity: 1;
    }
    .empty { color: #666; text-align: center; padding: 40px 0; font-size: 14px; }
    .footer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2a2a44;
      font-size: 11px;
      color: #666;
      text-align: center;
      flex-shrink: 0;
    }
    .btn-collapse:hover {
      background: #3a3a5a !important;
      color: #fff !important;
    }
  </style>
</head>
<body class="preview-mode collapsed">
  <div class="fu-manager-body">
    <!-- 左栏：角色卡列表与管理 -->
    <div class="fu-manager-right">
      <div class="header">
        <h2>📋 FU角色卡</h2>
        <!-- 隐藏的 File Input -->
        <input type="file" id="excelFile" accept=".xlsx, .xls" style="display:none">
        <button class="btn-import" id="importBtn">📄 导入Excel</button>
      </div>
      <div class="list" id="cardList">
        <div class="empty">暂无角色卡<br>点击"导入Excel"上传</div>
      </div>
      <div class="footer" id="statusBar">正在初始化 SDK...</div>
    </div>

    <!-- 右栏：卡片信息预览区 -->
    <div class="fu-manager-left" id="previewPane">
      <div class="fu-manager-preview-placeholder">
        <span style="color:#666;font-size:16px;">👈 请从左侧选择一张角色卡进行预览</span>
      </div>
    </div>
  </div>

  <!-- 使用本地构建打包的脚本 -->
  <script type="module" src="./dist/popover.js"></script>
</body>
</html>
