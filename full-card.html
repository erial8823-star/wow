<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FU角色卡</title>
  <link rel="stylesheet" href="./styles/main.css">
  <style>
    body {
      background: #1a1a2e;
      color: #eee;
      padding: 16px;
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow-y: auto;
    }
    /* 使卡片适应弹窗大小，去掉原本固定定位和阴影 */
    .fu-full-card {
      position: relative !important;
      left: 0 !important;
      top: 0 !important;
      width: 100% !important;
      height: auto !important;
      box-shadow: none !important;
      border: none !important;
      margin: 0 auto;
    }
    .fu-card-close {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="fu-full-card" id="cardContainer">
    <div style="text-align: center; padding: 40px; color: #888;">
      ⏳ 正在加载角色卡数据...
    </div>
  </div>

  <!-- 使用外部 ES module 形式加载脚本 -->
  <script type="module" src="./full-card.js"></script>
</body>
</html>
