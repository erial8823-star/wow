<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FU角色卡面板</title>
  <link rel="stylesheet" href="./styles/main.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #1a1a2e;
      color: #e6e6e6;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background-color: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    .header-title {
      font-size: 16px;
      font-weight: bold;
      color: #f0c060;
    }
    .file-input-wrapper {
      position: relative;
    }
    .btn {
      background-color: #e94560;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #d63447;
    }
    .btn-secondary {
      background-color: #0f3460;
    }
    .btn-secondary:hover {
      background-color: #1a4175;
    }
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .bind-layout {
      display: flex;
      width: 100%;
      height: 100%;
    }
    .card-list {
      width: 300px;
      border-right: 1px solid #0f3460;
      overflow-y: auto;
      padding: 10px;
    }
    .card-item {
      padding: 12px;
      margin-bottom: 8px;
      background-color: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
    }
    .card-item:hover, .card-item.active {
      border-color: #f0c060;
      background-color: #1f2d52;
    }
    .card-item-title {
      font-size: 14px;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 4px;
    }
    .card-item-sub {
      font-size: 12px;
      color: #8a8a8a;
    }
    .preview-panel {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .preview-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 5px;
    }
    .form-control {
      width: 100%;
      padding: 8px 12px;
      background-color: #0f3460;
      border: 1px solid #1a4175;
      border-radius: 4px;
      color: #fff;
      font-size: 14px;
    }
    .form-control:focus {
      outline: none;
      border-color: #f0c060;
    }
    .form-row {
      display: flex;
      gap: 10px;
    }
    .form-row .form-group {
      flex: 1;
    }
    .footer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #0f3460;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header-bar">
      <div class="header-title" id="page-title">FU角色卡管理</div>
      <div class="file-input-wrapper" id="upload-wrapper">
        <input type="file" id="excel-file-input" accept=".xlsx, .xls" style="display: none;" />
        <button class="btn btn-secondary" id="btn-trigger-upload">导入Excel角色卡</button>
      </div>
    </div>

    <div class="content-area" id="main-content">
      <!-- 动态通过 JS 渲染 -->
    </div>
  </div>

  <script type="module" src="./src/popover.js"></script>
</body>
</html>
