<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FU角色卡</title>
  <link rel="stylesheet" href="./styles/main.css">
  <style>
    body {
      background: #1a1a2e;
      color: #eee;
      padding: 16px;
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow-y: auto;
    }
    /* 使卡片适应弹窗大小，保留其漂亮的卡片边框、圆角与阴影 */
    .fu-full-card {
      position: relative !important;
      left: 0 !important;
      top: 0 !important;
      transform: none !important; /* 清除 main.css 里面的 translate(-50%, -50%) 偏移 */
      width: 100% !important;
      height: auto !important;
      max-height: none !important; /* 允许高度自适应，不被 85vh 截断 */
      overflow: visible !important; /* 允许内容展开，由外部 body 滚动 */
      margin: 0 auto;
    }
    .fu-card-close {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="fu-full-card" id="cardContainer">
    <div style="text-align: center; padding: 40px; color: #888;">
      ⏳ 正在加载角色卡数据...
    </div>
  </div>

  <!-- 使用本地构建打包的脚本 -->
  <script type="module" src="./dist/full-card.js"></script>
</body>
</html>
