<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FU角色卡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .header h2 { color: #f0c060; font-size: 16px; }
    .btn-import {
      background: #2d7d46;
      color: #fff;
      border: none;
      padding: 4px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-import:hover { background: #3da05a; }
    .list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .list-item {
      padding: 8px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid transparent;
      font-size: 13px;
      color: #ddd;
    }
    .list-item:hover {
      background: rgba(255,255,255,0.08);
      border-color: #3a3a5a;
    }
    .list-item .id { color: #666; font-size: 11px; margin-left: 8px; }
    .empty { color: #666; text-align: center; padding: 40px 0; font-size: 14px; }
    .footer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2a2a44;
      font-size: 11px;
      color: #666;
      text-align: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>📋 FU角色卡</h2>
    <button class="btn-import" id="importBtn">📄 导入Excel</button>
  </div>
  <div class="list" id="cardList">
    <div class="empty">暂无角色卡<br>点击"导入Excel"上传</div>
  </div>
  <div class="footer" id="statusBar">就绪</div>

  <script>
    const STORAGE_PREFIX = 'cc-fu-data-';

    function getCardList() {
      const keys = Object.keys(localStorage);
      const ourKeys = keys.filter(k => k.startsWith(STORAGE_PREFIX));
      return ourKeys.map(key => {
        const id = key.slice(STORAGE_PREFIX.length);
        try {
          const data = JSON.parse(localStorage.getItem(key));
          return { id, name: data.name || '未命名' };
        } catch (e) {
          return { id, name: '未知' };
        }
      });
    }

    function renderList() {
      const list = document.getElementById('cardList');
      const cards = getCardList();
      if (cards.length === 0) {
        list.innerHTML = `<div class="empty">暂无角色卡<br>点击"导入Excel"上传</div>`;
        document.getElementById('statusBar').textContent = '共 0 张角色卡';
        return;
      }
      let html = '';
      cards.forEach(card => {
        html += `<div class="list-item" data-id="${card.id}">${card.name}<span class="id">${card.id}</span></div>`;
      });
      list.innerHTML = html;
      document.getElementById('statusBar').textContent = `共 ${cards.length} 张角色卡`;

      list.querySelectorAll('.list-item').forEach(item => {
        item.addEventListener('click', () => {
          const cardId = item.dataset.id;
          // 发送消息到主页面（background.js 会监听）
          window.parent.postMessage({
            type: 'fu-open-card',
            cardId: cardId
          }, '*');
        });
      });
    }

    document.getElementById('importBtn').addEventListener('click', () => {
      window.parent.postMessage({ type: 'fu-import-excel' }, '*');
    });

    window.addEventListener('storage', (e) => {
      if (e.key && e.key.startsWith(STORAGE_PREFIX)) renderList();
    });

    renderList();
  </script>

  <!-- ============================================================
  手动加载 background.js 并注入到枭熊2主页面
  ============================================================ -->
  <script>
    (function() {
      // 检查是否已经加载过
      if (window.__fu_background_loaded) {
        console.log('⚠️ background.js 已经加载过了');
        return;
      }

      console.log('📦 正在获取 background.js...');

      fetch('https://erial8823-star.github.io/wow/dist/background.js')
        .then(response => response.text())
        .then(code => {
          console.log('📝 获取到代码，长度:', code.length);
          console.log('📦 正在注入到主页面...');

          try {
            // 通过 window.parent 将代码注入到主页面执行
            const parentWindow = window.parent;
            const func = new parentWindow.Function(code);
            func();
            console.log('✅ background.js 已注入到主页面！');
            window.__fu_background_loaded = true;
          } catch (err) {
            console.error('❌ 注入失败:', err);
            // 备用方案：使用 eval
            try {
              window.parent.eval(code);
              console.log('✅ 使用 eval 注入成功');
              window.__fu_background_loaded = true;
            } catch (e2) {
              console.error('❌ eval 注入也失败:', e2);
            }
          }
        })
        .catch(err => {
          console.error('❌ 获取 background.js 失败:', err);
        });
    })();
  </script>
</body>
</html>
